aid: cheetah
name: Cheetah
description: >-
  Cheetah (Cheetah Technologies, also operating as Kimelo) is an app-based
  restaurant supply and wholesale ordering marketplace launched in 2015 to
  bridge the digital gap in foodservice. Its eCommerce platform gives small to
  medium-sized food distributors and restaurants tools for online ordering,
  process automation, delivery route optimization, supply chain management, and
  customer retention, with next-day delivery of daily supplies. Cheetah lets
  distributors integrate directly with their ERP or inventory management system
  to automate order placement. Cheetah does not appear to publish a public
  developer API; integration is offered through direct ERP and inventory system
  connections rather than a documented developer portal.
