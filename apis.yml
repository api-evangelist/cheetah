aid: cheetah
name: Cheetah
description: >-
  Cheetah (Cheetah Technologies, with its software platform also marketed as
  Kimelo) is an AI-enabled, app-based restaurant supply and wholesale ordering
  marketplace launched in 2015 to bridge the digital gap in foodservice. Its
  eCommerce platform gives small to medium-sized food distributors and
  restaurants tools for online ordering, process automation, delivery route
  optimization, supply chain management, and customer retention, with next-day
  delivery of daily supplies. In June 2024 the company divested its physical
  distribution business (Pleasanton, CA) to Palo Alto Foods to focus on
  commercializing its software platform nationwide. The platform provides
  digital product catalogs, personalized purchasing insights, integrated
  payment processing, routing management, and automated inventory tracking, and
  lets distributors integrate directly with their ERP or inventory management
  and point-of-sale systems to automate order placement. Cheetah does not
  appear to publish a public developer API or developer portal; integration is
  offered through direct ERP, inventory, and POS system connections arranged
  with the company rather than self-service documented endpoints.
